function scaricaRefertoPDF(visita, referto) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const oggi = new Date().toLocaleDateString("it-IT");
  doc.setFillColor(26,58,92); doc.rect(0,0,210,38,"F");

  doc.text("Data: "+oggi+" | Televisita",14,30);
  doc.setTextColor(0,0,0); let y=50;
  const sez=(t)=>{doc.setFillColor(240,244,248);doc.rect(14,y-6,182,7,"F");doc.setFontSize(8);doc.setFont("helvetica","bold");doc.setTextColor(100,100,100);doc.text(t,14,y);y+=8;doc.setFont("helvetica","normal");doc.setTextColor(0,0,0);doc.setFontSize(10);};
  sez("DATI PAZIENTE");
  doc.text("Nome: "+visita.nome,14,y);y+=6;
  doc.text("CF: "+(visita.cf||"—"),14,y);y+=6;
  doc.text("Email: "+(visita.email||"—"),14,y);y+=12;
  [["ANAMNESI",referto.anamnesi],["ESAME OBIETTIVO",referto.esame],["DIAGNOSI",referto.diagnosi],["PIANO TERAPEUTICO",referto.terapia]].forEach(([t,v])=>{
    if(!v)return; sez(t);
    const righe=doc.splitTextToSize(v,180); doc.text(righe,14,y); y+=righe.length*6+8;
    if(y>270){doc.addPage();y=20;}
  });
  y+=10; doc.line(14,y,100,y); y+=5;
  doc.setFontSize(9); doc.setTextColor(80,80,80);
  doc.text("Dott. Marcello Mercenaro",14,y);y+=5;
  doc.text("Medico Chirurgo — Fisiatra",14,y);
  doc.save("Referto_"+visita.nome.replace(/ /g,"_")+"_"+oggi.replace(/\//g,"-")+".pdf");
}

      </div>
      <button onClick={()=>{setInvio("idle");setForm({nome:"",cognome:"",cf:"",ddn:"",email:"",tel:"",ind:"",data:"",orario:"Mattina (9:00–12:30)",motivo:""});}} style={{padding:"10px 20px",background:"white",border:"1.5px solid #dde3ea",borderRadius:8,cursor:"pointer",fontSize:"0.85rem",fontWeight:700}}>← Nuova prenotazione</button>

  return <div>

      <div style={{display:"inline-block",background:"rgba(255,255,255,0.15)",borderRadius:20,padding:"4px 14px",fontSize:"0.72rem",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:10,marginLeft:10}}>Medicina Fisica e Riabilitazione</div>
      <h1 style={{fontSize:"1.4rem",marginBottom:6}}>Prenota la tua televisita</h1>
      <p style={{fontSize:"0.82rem",opacity:0.75}}>Dott. Marcello Mercenaro · Medico Chirurgo · Specialista in Medicina Fisica e Riabilitazione · Fisiatra</p>
    </div>
    <div style={{maxWidth:600,margin:"0 auto",padding:20}}>
      <div style={{background:"white",borderRadius:14,border:"1px solid #dde3ea",padding:24,boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
        <h2 style={{fontSize:"1.1rem",marginBottom:4}}>Modulo di prenotazione</h2>
        <p style={{fontSize:"0.82rem",color:"#666",marginBottom:18}}>Compila tutti i campi obbligatori *</p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          {[["Nome *","nome","Mario"],["Cognome *","cognome","Rossi"]].map(([l,k,ph])=>(
            <div key={k}><label style={{display:"block",fontSize:"0.75rem",fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:4}}>{l}</label>
            <input value={form[k]} onChange={e=>set(k,e.target.value)} placeholder={ph} style={{width:"100%",padding:"10px 12px",border:"1.5px solid #ccd3db",borderRadius:9,fontSize:"0.9rem",outline:"none"}}/></div>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginTop:12}}>
          <div><label style={{display:"block",fontSize:"0.75rem",fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:4}}>Codice Fiscale * (16 car.)</label>
          <input value={form.cf} onChange={e=>set("cf",e.target.value.toUpperCase())} maxLength={16} placeholder="RSSMRA70A01H501Z" style={{width:"100%",padding:"10px 12px",border:"1.5px solid #ccd3db",borderRadius:9,fontSize:"0.85rem",fontFamily:"monospace",outline:"none"}}/></div>
          <div><label style={{display:"block",fontSize:"0.75rem",fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:4}}>Data di nascita</label>
          <input type="date" value={form.ddn} onChange={e=>set("ddn",e.target.value)} style={{width:"100%",padding:"10px 12px",border:"1.5px solid #ccd3db",borderRadius:9,fontSize:"0.9rem",outline:"none"}}/></div>
        </div>
        {[["Email * (riceverai link visita e fattura)","email","email","mario.rossi@email.com"],["Telefono","tel","tel","+39 333 0000000"],["Indirizzo (per fattura)","ind","text","Via Roma 1, Milano"]].map(([l,k,t,ph])=>(
          <div key={k} style={{marginTop:12}}><label style={{display:"block",fontSize:"0.75rem",fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:4}}>{l}</label>
          <input value={form[k]} onChange={e=>set(k,e.target.value)} type={t} placeholder={ph} style={{width:"100%",padding:"10px 12px",border:"1.5px solid #ccd3db",borderRadius:9,fontSize:"0.9rem",outline:"none"}}/></div>
        ))}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginTop:12}}>
          <div><label style={{display:"block",fontSize:"0.75rem",fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:4}}>Data preferita *</label>
          <input type="date" min={oggi} value={form.data} onChange={e=>set("data",e.target.value)} style={{width:"100%",padding:"10px 12px",border:"1.5px solid #ccd3db",borderRadius:9,fontSize:"0.9rem",outline:"none"}}/></div>
          <div><label style={{display:"block",fontSize:"0.75rem",fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:4}}>Fascia oraria *</label>
          <select value={form.orario} onChange={e=>set("orario",e.target.value)} style={{width:"100%",padding:"10px 12px",border:"1.5px solid #ccd3db",borderRadius:9,fontSize:"0.9rem",outline:"none"}}>
            <option>Mattina (9:00–12:30)</option><option>Pomeriggio (14:00–17:30)</option>
          </select></div>
        </div>
        <div style={{marginTop:12}}><label style={{display:"block",fontSize:"0.75rem",fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:4}}>Motivo della visita *</label>
        <textarea value={form.motivo} onChange={e=>set("motivo",e.target.value)} placeholder="Descrivi il tuo problema..." style={{width:"100%",padding:"10px 12px",border:"1.5px solid #ccd3db",borderRadius:9,fontSize:"0.9rem",outline:"none",height:85,resize:"vertical",fontFamily:"inherit"}}/></div>
        <div style={{background:"#fdf3e0",border:"1.5px solid rgba(176,125,46,0.4)",borderRadius:12,padding:16,marginTop:16}}>
          <p style={{fontSize:"0.78rem",fontWeight:700,color:"#b07d2e",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>💳 Pagamento anticipato — € 80,00</p>
          <p style={{fontSize:"0.82rem",marginBottom:8}}>Intestato a: <strong>Dott. Marcello Mercenaro</strong></p>
          <div style={{display:"flex",alignItems:"center",gap:10,background:"white",borderRadius:8,padding:"8px 12px",border:"1px solid #ddc080",marginBottom:8}}>
            <span style={{fontFamily:"monospace",fontSize:"0.9rem",fontWeight:700,flex:1,letterSpacing:"0.04em"}}>{IBAN}</span>
            <button onClick={copiaIban} style={{padding:"4px 12px",background:"#b07d2e",color:"white",border:"none",borderRadius:6,cursor:"pointer",fontSize:"0.75rem",fontWeight:700}}>📋 Copia</button>
          </div>
          {ibanCopiato&&<span style={{fontSize:"0.72rem",color:"#1d7a5f",fontWeight:700}}>✅ IBAN copiato!</span>}
          <p style={{fontSize:"0.76rem",color:"#666"}}>Causale: <em>Televisita fisiatrica — [nome cognome]</em></p>
        </div>
        <div style={{background:"#fdf3e0",border:"1.5px solid rgba(176,125,46,0.35)",borderRadius:12,padding:14,marginTop:12}}>
          <p style={{fontSize:"0.83rem",lineHeight:1.6}}>📧 <strong>Dopo aver inviato</strong>, invia la ricevuta del bonifico a:<br/>
          <a href={"mailto:"+EMAIL_MEDICO} style={{color:"#2558a0",fontWeight:700}}>{EMAIL_MEDICO}</a><br/>
          <span style={{fontSize:"0.75rem",color:"#666"}}>Oggetto: <em>Bonifico televisita — [nome cognome]</em></span></p>
          <p style={{fontSize:"0.76rem",color:"#b07d2e",fontWeight:700,marginTop:6}}>⚠️ La visita sarà confermata solo dopo verifica del pagamento.</p>
        </div>
        <p style={{fontSize:"0.72rem",color:"#888",background:"#f0f4f8",borderRadius:8,padding:"10px 13px",marginTop:12,lineHeight:1.5}}>🔒 Dati trattati ai sensi del GDPR (Reg. UE 2016/679) per soli fini clinici e amministrativi.</p>
        <button onClick={invia} disabled={invio==="loading"} style={{width:"100%",padding:14,background:invio==="loading"?"#8aaccc":"#2558a0",color:"white",border:"none",borderRadius:9,cursor:invio==="loading"?"not-allowed":"pointer",fontSize:"0.95rem",fontWeight:700,marginTop:12}}>
          {invio==="loading"?"⏳ Invio in corso...":"✅ Invia richiesta di prenotazione"}
        </button>
      </div>
    </div>
  </div>;
}

function StanzaVisita({visita,setPagina}){
  const [referto,setReferto]=useState({anamnesi:"",esame:"",diagnosi:"",terapia:"",importo:"80"});
  const [modalAperto,setModalAperto]=useState(false);
  const [inviato,setInviato]=useState(false);
  function set(k,v){setReferto(r=>({...r,[k]:v}));}
  function inviaFattura(){
    const fatt={nome:visita.nome,cf:visita.cf,email:visita.email,indirizzo:visita.indirizzo||"—",data:new Date().toLocaleDateString("it-IT"),datavisita:visita.data||new Date().toLocaleDateString("it-IT"),diagnosi:referto.diagnosi||"Visita fisiatrica",importo:parseFloat(referto.importo).toFixed(2)};
    salvaFatturaSupabase(fatt);
    setModalAperto(false);setInviato(true);
  }
  if(inviato)return(
    <div style={{maxWidth:400,margin:"60px auto",padding:20,textAlign:"center"}}>
      <div style={{fontSize:"2.5rem",marginBottom:12}}>📨</div>
      <h3 style={{fontSize:"1.2rem",marginBottom:10}}>Visita chiusa!</h3>
      <p style={{color:"#666",fontSize:"0.85rem",marginBottom:16}}>Fattura salvata in dashboard.<br/><strong>{visita.email}</strong></p>
      <button onClick={()=>{setInviato(false);setPagina("Dashboard");}} style={{width:"100%",padding:13,background:"#2558a0",color:"white",border:"none",borderRadius:8,cursor:"pointer",fontSize:"0.9rem",fontWeight:700}}>✅ Torna alla dashboard</button>
    </div>
  );
  return <div style={{maxWidth:900,margin:"0 auto",padding:20}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:10}}>
      <div><h1 style={{fontSize:"1.2rem"}}>Televisita — {visita.nome}</h1><p style={{color:"#666",fontSize:"0.82rem"}}>{visita.motivo}</p></div>
      <button onClick={()=>setModalAperto(true)} style={{padding:"10px 20px",background:"#c0392b",color:"white",border:"none",borderRadius:8,cursor:"pointer",fontSize:"0.85rem",fontWeight:700}}>📩 Chiudi e invia fattura + referto</button>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1.3fr",gap:16}}>
      <div>
        <div style={{background:"#101826",borderRadius:12,aspectRatio:"4/3",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",color:"white",textAlign:"center",position:"relative"}}>
          <div style={{width:64,height:64,borderRadius:"50%",background:"linear-gradient(135deg,#2558a0,#1d7a5f)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.6rem",marginBottom:8}}>🧑‍⚕️</div>
          <p style={{fontSize:"0.85rem",opacity:0.8}}>{visita.nome}</p>
          <p style={{fontSize:"0.7rem",opacity:0.4,marginTop:4}}>Connessione sicura · Jitsi Meet</p>
          <div style={{position:"absolute",bottom:10,right:10,background:"#1e2d3d",borderRadius:6,padding:"5px 9px",fontSize:"0.7rem",opacity:0.8}}>🩺 Tu (medico)</div>
        </div>
        <div style={{display:"flex",gap:8,justifyContent:"center",marginTop:10}}>
          {["🎤","📷","🖥️"].map(e=><button key={e} style={{width:40,height:40,borderRadius:"50%",border:"none",background:"rgba(26,58,92,0.12)",fontSize:"1rem",cursor:"pointer"}}>{e}</button>)}
          <a href={visita.link} target="_blank" style={{padding:"0 14px",height:40,background:"#2558a0",color:"white",border:"none",borderRadius:20,cursor:"pointer",fontSize:"0.75rem",fontWeight:700,display:"flex",alignItems:"center",textDecoration:"none"}}>🎥 Entra in call</a>
        </div>
        <div style={{background:"white",borderRadius:10,border:"1px solid #dde3ea",padding:14,marginTop:12}}>
          <p style={{fontSize:"0.72rem",fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:10}}>Dati paziente</p>
          {[["Nome",visita.nome],["C.F.",visita.cf],["Email",visita.email],["Tel.",visita.tel||"—"],["Motivo",visita.motivo]].map(([k,v])=>(
            <div key={k} style={{fontSize:"0.82rem",marginBottom:5}}><strong>{k}:</strong> <span style={k==="C.F."?{fontFamily:"monospace"}:{}}>{v}</span></div>
          ))}
        </div>
      </div>
      <div style={{background:"white",borderRadius:14,border:"1px solid #dde3ea",padding:20}}>
        <h3 style={{fontSize:"1rem",fontWeight:700,color:"#1a3a5c",marginBottom:14}}>📋 Referto fisiatrico</h3>
        {[["anamnesi","Anamnesi","Paziente riferisce..."],["esame","Esame obiettivo","ROM, forza muscolare..."],["terapia","Piano terapeutico","Fisioterapia, farmaci..."]].map(([k,l,ph])=>(
          <div key={k} style={{marginBottom:12}}>
            <label style={{display:"block",fontSize:"0.72rem",fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:4}}>{l}</label>
            <textarea value={referto[k]} onChange={e=>set(k,e.target.value)} placeholder={ph} style={{width:"100%",padding:"9px 11px",border:"1.5px solid #ccd3db",borderRadius:8,fontSize:"0.83rem",outline:"none",height:70,resize:"vertical",fontFamily:"inherit"}}/>
          </div>
        ))}
        <div style={{marginBottom:12}}>
          <label style={{display:"block",fontSize:"0.72rem",fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:4}}>Diagnosi</label>
          <input value={referto.diagnosi} onChange={e=>set("diagnosi",e.target.value)} placeholder="Es: Lombalgia cronica — M54.5" style={{width:"100%",padding:"9px 11px",border:"1.5px solid #ccd3db",borderRadius:8,fontSize:"0.83rem",outline:"none"}}/>
        </div>
        <div style={{marginBottom:12}}>
          <label style={{display:"block",fontSize:"0.72rem",fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:4}}>Importo € visita</label>
          <input type="number" value={referto.importo} onChange={e=>set("importo",e.target.value)} min="0" step="5" style={{width:120,padding:"9px 11px",border:"1.5px solid #ccd3db",borderRadius:8,fontSize:"0.83rem",outline:"none"}}/>
        </div>
        <button onClick={()=>setModalAperto(true)} style={{width:"100%",padding:13,background:"#c0392b",color:"white",border:"none",borderRadius:8,cursor:"pointer",fontSize:"0.9rem",fontWeight:700}}>📩 Chiudi e invia fattura + referto</button>
      </div>
    </div>
    {modalAperto&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:"white",borderRadius:14,maxWidth:500,width:"100%",maxHeight:"90vh",overflowY:"auto"}}>
        <div style={{background:"#1a3a5c",color:"white",padding:"18px 24px",borderRadius:"14px 14px 0 0"}}>
          <h2 style={{fontSize:"1.1rem"}}>🧾 Fattura / Ricevuta</h2>
          <p style={{fontSize:"0.72rem",opacity:0.7,marginTop:2}}>{new Date().toLocaleDateString("it-IT")}</p>
        </div>
        <div style={{padding:"18px 24px"}}>
          {[["PRESTATORE",""],["Dott. Marcello Mercenaro","Medico Chirurgo · Fisiatra"],["Email",EMAIL_MEDICO],["",""],["PAZIENTE",""],["Nome",visita.nome],["Codice Fiscale",visita.cf||"—"],["Email",visita.email||"—"],["",""],["PRESTAZIONE",""],["Televisita fisiatrica",visita.data||new Date().toLocaleDateString("it-IT")],["Diagnosi",referto.diagnosi||"Visita fisiatrica"]].map(([k,v],i)=>
            k===""?<div key={i} style={{height:8}}/>:
            v===""?<p key={i} style={{fontSize:"0.72rem",fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:"0.05em",margin:"10px 0 6px"}}>{k}</p>:
            <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",fontSize:"0.83rem",borderBottom:"1px solid #f5f5f5"}}><span>{k}</span><strong>{v}</strong></div>
          )}
          <div style={{background:"#ddeaf8",borderRadius:8,padding:"12px 16px",margin:"12px 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:"0.85rem"}}>Totale</span>
            <strong style={{fontSize:"1.3rem",color:"#1a3a5c"}}>€ {parseFloat(referto.importo||80).toFixed(2).replace(".",",")}</strong>
          </div>
          <div style={{background:"#d8f0e8",borderRadius:8,padding:"8px 14px",fontSize:"0.78rem",color:"#1d7a5f",fontWeight:700,marginBottom:8}}>✅ Pagamento ricevuto — IBAN {IBAN}</div>
          <p style={{fontSize:"0.7rem",color:"#888"}}>Prestazione medica esente IVA ai sensi art. 10 n.18 DPR 633/72</p>
        </div>
        <div style={{padding:"12px 24px 20px",display:"flex",gap:8,justifyContent:"flex-end",flexWrap:"wrap",borderTop:"1px solid #eee"}}>
          <button onClick={()=>setModalAperto(false)} style={{padding:"10px 16px",background:"#f0f4f8",border:"none",borderRadius:8,cursor:"pointer",fontWeight:700}}>Annulla</button>
          <button onClick={()=>scaricaFatturaPDF({nome:visita.nome,cf:visita.cf,email:visita.email,indirizzo:visita.indirizzo||"—",data:new Date().toLocaleDateString("it-IT"),dataVisita:visita.data,diagnosi:referto.diagnosi||"Visita fisiatrica",importo:parseFloat(referto.importo||80).toFixed(2),numero:"—"})} style={{padding:"10px 16px",background:"#b07d2e",color:"white",border:"none",borderRadius:8,cursor:"pointer",fontWeight:700}}>📥 PDF Fattura</button>
          <button onClick={()=>scaricaRefertoPDF(visita,referto)} style={{padding:"10px 16px",background:"#2558a0",color:"white",border:"none",borderRadius:8,cursor:"pointer",fontWeight:700}}>📥 PDF Referto</button>
          <button onClick={inviaFattura} style={{padding:"10px 16px",background:"#1d7a5f",color:"white",border:"none",borderRadius:8,cursor:"pointer",fontWeight:700}}>✅ Chiudi visita</button>
        </div>
      </div>
    </div>}
  </div>;
}

function Login({onLogin}){
  const [pw,setPw]=useState("");
  const [err,setErr]=useState(false);
  function prova(){
    if(pw==="Mercenaro2025!"){onLogin();}
    else{setErr(true);setTimeout(()=>setErr(false),2000);}
  }
  return <div style={{minHeight:"100vh",background:"#f0f4f8",display:"flex",alignItems:"center",justifyContent:"center"}}>
    <div style={{background:"white",borderRadius:16,padding:40,maxWidth:380,width:"90%",boxShadow:"0 4px 32px rgba(0,0,0,0.12)",textAlign:"center"}}>
      <img src={LOGO_URI} style={{width:72,height:72,borderRadius:14,objectFit:"cover",marginBottom:16}}/>
      <h2 style={{fontSize:"1.2rem",marginBottom:4}}>Dott. Marcello Mercenaro</h2>
      <p style={{fontSize:"0.82rem",color:"#888",marginBottom:24}}>Accesso riservato al medico</p>
      <input type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&prova()} placeholder="Password" style={{width:"100%",padding:"12px 14px",border:"1.5px solid "+(err?"#c0392b":"#ccd3db"),borderRadius:9,fontSize:"0.95rem",outline:"none",marginBottom:12,textAlign:"center"}}/>
      {err&&<p style={{color:"#c0392b",fontSize:"0.8rem",marginBottom:8}}>Password errata</p>}
      <button onClick={prova} style={{width:"100%",padding:13,background:"#2558a0",color:"white",border:"none",borderRadius:9,cursor:"pointer",fontSize:"0.95rem",fontWeight:700}}>🔐 Accedi</button>
    </div>
  </div>;
}

function App(){
  const [pagina,setPagina]=useState("Dashboard");
  const [visitaCorrente,setVisitaCorrente]=useState(null);
  // Se URL ha #prenota mostra SOLO il form — niente nav, niente dashboard
  if(window.location.hash==="#prenota"){
    return <div style={{fontFamily:"Arial,sans-serif",minHeight:"100vh",background:"#f0f4f8"}}>
      <div style={{background:"#1a3a5c",padding:"12px 20px",display:"flex",alignItems:"center",gap:10}}>
        <img src={LOGO_URI} style={{width:36,height:36,borderRadius:8,objectFit:"cover"}}/>
        <div style={{color:"white"}}>
          <div style={{fontWeight:700,fontSize:"0.9rem"}}>Dott. Marcello Mercenaro</div>
          <div style={{fontSize:"0.6rem",opacity:0.65}}>Medico Chirurgo · Spec. Medicina Fisica e Riabilitazione · Fisiatra</div>
        </div>
      </div>
      <FormPrenota setPagina={()=>{}}/>
    </div>;
  }

  // Altrimenti mostra tutto (per il medico)
  return <div style={{fontFamily:"Arial,sans-serif",minHeight:"100vh",background:"#f0f4f8"}}>
    <Nav pagina={pagina} setPagina={setPagina}/>
    <LinkBanner/>
    {pagina==="Dashboard"&&<Dashboard setPagina={setPagina} setVisitaCorrente={setVisitaCorrente}/>}
    {pagina==="Prenota"&&<FormPrenota setPagina={setPagina}/>}
    {pagina==="Visita"&&visitaCorrente&&<StanzaVisita visita={visitaCorrente} setPagina={setPagina}/>}
    {pagina==="Visita"&&!visitaCorrente&&<div style={{textAlign:"center",padding:"60px 20px",color:"#888"}}>
      <p>Nessuna visita avviata.</p>
      <button onClick={()=>setPagina("Dashboard")} style={{marginTop:16,padding:"10px 20px",background:"#2558a0",color:"white",border:"none",borderRadius:8,cursor:"pointer",fontWeight:700}}>← Dashboard</button>
    </div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
